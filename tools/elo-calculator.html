<h2 class="sr-only" style="font-family: 'Helvetica', sans-serif;">Padel-Liga Elo-Rechner</h2>

<style>
.wrap { padding: 1.5rem 0; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.lbl { font-family: 'Helvetica', sans-serif; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.row input[type=text] { flex: 2; min-width: 0; }
.row input[type=number] { flex: 1; min-width: 0; }
.sublbl { font-family: 'Helvetica', sans-serif; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; margin-top: 10px; }
.score-wrap { display: flex; gap: 8px; align-items: center; }
.score-wrap input { width: 56px; }
.score-wrap span { font-family: 'Helvetica', sans-serif; font-size: 13px; color: var(--color-text-tertiary); }
.btn { width: 100%; padding: 10px; font-family: 'Helvetica', sans-serif; font-size: 15px; font-weight: 500; margin-top: 4px; cursor: pointer; }
.res-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.res-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.res-row:last-child { border-bottom: none; }
.res-name { font-family: 'Helvetica', sans-serif; font-size: 14px; color: var(--color-text-primary); }
.res-right { display: flex; gap: 10px; align-items: center; }
.delta-pos { font-family: 'Helvetica', sans-serif; font-size: 13px; font-weight: 500; color: var(--color-text-success); }
.delta-neg { font-family: 'Helvetica', sans-serif; font-size: 13px; font-weight: 500; color: var(--color-text-danger); }
.new-elo { font-family: 'Helvetica', sans-serif; font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.prob-bar { height: 6px; border-radius: 3px; background: var(--color-border-tertiary); margin: 8px 0 4px; overflow: hidden; }
.prob-fill { height: 100%; background: var(--color-background-info); border-radius: 3px; transition: width 0.3s; }
.prob-txt { font-family: 'Helvetica', sans-serif; font-size: 13px; color: var(--color-text-secondary); text-align: center; }
.err { font-family: 'Helvetica', sans-serif; font-size: 13px; color: var(--color-text-danger); margin-top: 6px; }
.pf-info { font-family: 'Helvetica', sans-serif; font-size: 12px; color: var(--color-text-tertiary); margin-top: 8px; text-align: center; }
.tb-section { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
</style>

<div class="wrap">
  <div class="grid2">
    <div class="card">
      <div class="lbl">Team 1</div>
      <div class="row">
        <input type="text" id="t1p1n" placeholder="Name">
        <input type="number" id="t1p1e" placeholder="Elo" value="1000">
      </div>
      <div class="row">
        <input type="text" id="t1p2n" placeholder="Name">
        <input type="number" id="t1p2e" placeholder="Elo" value="1000">
      </div>
    </div>
    <div class="card">
      <div class="lbl">Team 2</div>
      <div class="row">
        <input type="text" id="t2p1n" placeholder="Name">
        <input type="number" id="t2p1e" placeholder="Elo" value="1000">
      </div>
      <div class="row">
        <input type="text" id="t2p2n" placeholder="Name">
        <input type="number" id="t2p2e" placeholder="Elo" value="1000">
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom: 12px;">
    <div class="lbl" style="margin-bottom: 4px;">Ergebnis</div>
    <div class="sublbl" style="margin-top: 6px;">Satz 1</div>
    <div class="score-wrap">
      <input type="number" id="s1t1" min="0" max="7" value="6" placeholder="T1">
      <span>:</span>
      <input type="number" id="s1t2" min="0" max="7" value="3" placeholder="T2">
    </div>
    <div class="sublbl">Satz 2</div>
    <div class="score-wrap">
      <input type="number" id="s2t1" min="0" max="7" value="6" placeholder="T1">
      <span>:</span>
      <input type="number" id="s2t2" min="0" max="7" value="2" placeholder="T2">
    </div>
    <div class="tb-section">
      <div class="sublbl" style="margin-top: 0;">Match-Tiebreak (optional, bis 10)</div>
      <div class="score-wrap">
        <input type="number" id="s3t1" min="0" max="10" placeholder="T1">
        <span>:</span>
        <input type="number" id="s3t2" min="0" max="10" placeholder="T2">
      </div>
    </div>
    <div id="err" class="err" style="display:none;"></div>
  </div>

  <button class="btn" onclick="calc()">Neue Elo-Werte berechnen</button>

  <div id="result" style="display:none; margin-top: 16px;">
    <div class="prob-txt" id="prob-txt"></div>
    <div class="prob-bar"><div class="prob-fill" id="prob-fill"></div></div>
    <div class="pf-info" id="pf-info"></div>
    <div class="grid2" style="margin-top: 12px;">
      <div class="res-card">
        <div class="lbl" style="margin-bottom: 8px;">Team 1</div>
        <div id="res1"></div>
      </div>
      <div class="res-card">
        <div class="lbl" style="margin-bottom: 8px;">Team 2</div>
        <div id="res2"></div>
      </div>
    </div>
  </div>
</div>

<script>
function E(a, b) { return 1 / (1 + Math.pow(10, (b - a) / 500)); }
function Ep(r, o1, o2) { return (E(r, o1) + E(r, o2)) / 2; }
function Kval(g) { return 50 / (1 + g / 300); }

function punktfaktor(s1t1, s1t2, s2t1, s2t2, s3t1, s3t2) {
  var regDiff = Math.abs((s1t1 + s2t1) - (s1t2 + s2t2));
  var tbNorm = 0;
  if (s3t1 !== null && s3t2 !== null) {
    tbNorm = (Math.abs(s3t1 - s3t2) / 10) * 3;
  }
  return Math.pow(Math.log10(regDiff + tbNorm + 1), 3) + 2;
}

function getWinner(s1t1, s1t2, s2t1, s2t2, s3t1, s3t2) {
  var w1 = (s1t1 > s1t2 ? 1 : 0) + (s2t1 > s2t2 ? 1 : 0);
  var w2 = (s1t2 > s1t1 ? 1 : 0) + (s2t2 > s2t1 ? 1 : 0);
  if (w1 === 2) return 1;
  if (w2 === 2) return 2;
  if (s3t1 !== null && s3t2 !== null) return s3t1 > s3t2 ? 1 : 2;
  return null;
}

function calc() {
  var t1p1n = document.getElementById('t1p1n').value || 'Spieler 1';
  var t1p2n = document.getElementById('t1p2n').value || 'Spieler 2';
  var t2p1n = document.getElementById('t2p1n').value || 'Spieler 3';
  var t2p2n = document.getElementById('t2p2n').value || 'Spieler 4';
  var t1p1e = parseFloat(document.getElementById('t1p1e').value) || 1000;
  var t1p2e = parseFloat(document.getElementById('t1p2e').value) || 1000;
  var t2p1e = parseFloat(document.getElementById('t2p1e').value) || 1000;
  var t2p2e = parseFloat(document.getElementById('t2p2e').value) || 1000;

  var s1t1 = parseInt(document.getElementById('s1t1').value) || 0;
  var s1t2 = parseInt(document.getElementById('s1t2').value) || 0;
  var s2t1 = parseInt(document.getElementById('s2t1').value) || 0;
  var s2t2 = parseInt(document.getElementById('s2t2').value) || 0;
  var s3t1v = document.getElementById('s3t1').value;
  var s3t2v = document.getElementById('s3t2').value;
  var s3t1 = s3t1v !== '' ? parseInt(s3t1v) : null;
  var s3t2 = s3t2v !== '' ? parseInt(s3t2v) : null;

  var err = document.getElementById('err');
  var w = getWinner(s1t1, s1t2, s2t1, s2t2, s3t1, s3t2);

  if (w === null) {
    err.textContent = 'Kein eindeutiger Sieger. Bei 1:1 Sätzen bitte Tiebreak eintragen.';
    err.style.display = 'block';
    document.getElementById('result').style.display = 'none';
    return;
  }
  err.style.display = 'none';

  var pf = punktfaktor(s1t1, s1t2, s2t1, s2t2, s3t1, s3t2);
  var k = Kval(0);

  var Ep1 = Ep(t1p1e, t2p1e, t2p2e);
  var Ep2 = Ep(t1p2e, t2p1e, t2p2e);
  var Ep3 = Ep(t2p1e, t1p1e, t1p2e);
  var Ep4 = Ep(t2p2e, t1p1e, t1p2e);

  var ET1 = (Ep1 + Ep2) / 2;

  var S1 = w === 1 ? 1 : 0;
  var S2 = w === 2 ? 1 : 0;

  var n1 = Math.round(t1p1e + pf * k * (S1 - Ep1));
  var n2 = Math.round(t1p2e + pf * k * (S1 - Ep2));
  var n3 = Math.round(t2p1e + pf * k * (S2 - Ep3));
  var n4 = Math.round(t2p2e + pf * k * (S2 - Ep4));

  var prob1 = Math.round(ET1 * 100);
  document.getElementById('prob-txt').textContent = 'Siegwahrscheinlichkeit: Team 1: ' + prob1 + '%  -  Team 2: ' + (100 - prob1) + '%';
  document.getElementById('prob-fill').style.width = prob1 + '%';
  document.getElementById('pf-info').textContent = 'Punktfaktor: ' + pf.toFixed(2) + '  -  Sieger: Team ' + w;

  function row(name, oldE, newE) {
    var d = newE - oldE;
    var cls = d >= 0 ? 'delta-pos' : 'delta-neg';
    return '<div class="res-row"><span class="res-name">' + name + '</span><div class="res-right"><span class="' + cls + '">' + (d >= 0 ? '+' : '') + d + '</span><span class="new-elo">' + newE + '</span></div></div>';
  }

  document.getElementById('res1').innerHTML = row(t1p1n, t1p1e, n1) + row(t1p2n, t1p2e, n2);
  document.getElementById('res2').innerHTML = row(t2p1n, t2p1e, n3) + row(t2p2n, t2p2e, n4);
  document.getElementById('result').style.display = 'block';

  window._last = {
    players: [
      {name: t1p1n, elo: n1}, {name: t1p2n, elo: n2},
      {name: t2p1n, elo: n3}, {name: t2p2n, elo: n4}
    ]
  };
}
</script>
